<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>etcd Monitor - Login</title>
    <link rel="icon" type="image/svg+xml" href="etcd-icon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            margin: 16px;
        }

        .login-logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: contain;
            display: block;
            margin: 0 auto 16px;
        }

        .login-title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .login-subtitle {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-error {
            display: none;
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            margin-top: 16px;
            text-align: center;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 38px;
        }

        .toggle-pwd {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            padding: 2px 4px;
            line-height: 1;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .toggle-pwd:hover {
            opacity: 1;
        }

        .login-footer {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 24px;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-card">
        <img class="login-logo" src="etcd-icon.svg" alt="etcd">
        <div class="login-title">etcd Monitor</div>
        <div class="login-subtitle" id="loginSubtitle"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="etcd username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="etcd password" autocomplete="current-password" required>
                    <button type="button" class="toggle-pwd" id="togglePwd" tabindex="-1" title="显示/隐藏密码">&#9673;</button>
                </div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">登 录</button>
            <div class="login-error" id="loginError"></div>
        </form>

        <div class="login-footer">etcd Monitor Dashboard</div>
    </div>

    <script>
    // 应用主题（防止闪烁）
    (function() {
        var theme = localStorage.getItem('etcdmonitor-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    })();

    // 如果不需要认证，或已登录，直接跳转大盘
    (async function() {
        try {
            var token = sessionStorage.getItem('etcdmonitor_token');
            var headers = token ? { 'Authorization': 'Bearer ' + token } : {};
            var resp = await fetch('/api/auth/status', { headers: headers });
            if (resp.ok) {
                var data = await resp.json();
                // 显示版本号
                if (data.app_version) {
                    document.getElementById('loginSubtitle').textContent = 'v' + data.app_version;
                }
                if (!data.auth_required || data.authenticated) {
                    window.location.href = '/';
                    return;
                }
            }
        } catch (e) {}
    })();

    // 密码明文切换（纯前端，不涉及网络）
    document.getElementById('togglePwd').addEventListener('click', function() {
        var pwd = document.getElementById('password');
        var isHidden = pwd.type === 'password';
        pwd.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? '\u25C9' : '\u25CB';
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        var btn = document.getElementById('loginBtn');
        var errorEl = document.getElementById('loginError');
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;

        if (!username || !password) return;

        btn.disabled = true;
        btn.textContent = '登录中...';
        errorEl.style.display = 'none';

        try {
            var resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            });

            if (resp.ok) {
                var data = await resp.json();
                // 将 token 存入 sessionStorage，不依赖 Cookie
                if (data.session_token) {
                    sessionStorage.setItem('etcdmonitor_token', data.session_token);
                }
                window.location.href = '/';
                return;
            }

            var data = await resp.json().catch(function() { return {}; });
            errorEl.textContent = data.error || '登录失败，请检查用户名和密码';
            errorEl.style.display = 'block';
        } catch (err) {
            errorEl.textContent = '网络错误：' + err.message;
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = '登 录';
        }
    });
    </script>
</body>
</html>
