<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>etcd Monitor - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            margin: 16px;
        }

        .login-logo {
            width: 48px;
            height: 48px;
            background: var(--accent-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 22px;
            color: #fff;
            margin: 0 auto 16px;
        }

        .login-title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .login-subtitle {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-error {
            display: none;
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            margin-top: 16px;
            text-align: center;
        }

        .login-footer {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 24px;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">E</div>
        <div class="login-title">etcd Monitor</div>
        <div class="login-subtitle">请输入 etcd 凭据以访问监控大盘</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="etcd username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="etcd password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">登 录</button>
            <div class="login-error" id="loginError"></div>
        </form>

        <div class="login-footer">etcd Monitor Dashboard</div>
    </div>

    <script>
    // 应用主题（防止闪烁）
    (function() {
        var theme = localStorage.getItem('etcdmonitor-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    })();

    // 如果不需要认证，或已登录，直接跳转大盘
    (async function() {
        try {
            var token = sessionStorage.getItem('etcdmonitor_token');
            var headers = token ? { 'Authorization': 'Bearer ' + token } : {};
            var resp = await fetch('/api/auth/status', { headers: headers });
            if (resp.ok) {
                var data = await resp.json();
                if (!data.auth_required || data.authenticated) {
                    window.location.href = '/';
                    return;
                }
            }
        } catch (e) {}
    })();

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        var btn = document.getElementById('loginBtn');
        var errorEl = document.getElementById('loginError');
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;

        if (!username || !password) return;

        btn.disabled = true;
        btn.textContent = '登录中...';
        errorEl.style.display = 'none';

        try {
            var resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            });

            if (resp.ok) {
                var data = await resp.json();
                // 将 token 存入 sessionStorage，不依赖 Cookie
                if (data.session_token) {
                    sessionStorage.setItem('etcdmonitor_token', data.session_token);
                }
                window.location.href = '/';
                return;
            }

            var data = await resp.json().catch(function() { return {}; });
            errorEl.textContent = data.error || '登录失败，请检查用户名和密码';
            errorEl.style.display = 'block';
        } catch (err) {
            errorEl.textContent = '网络错误：' + err.message;
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = '登 录';
        }
    });
    </script>
</body>
</html>
