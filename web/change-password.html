<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>etcd Monitor - Change Password</title>
    <link rel="icon" type="image/svg+xml" href="etcd-icon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            margin: 16px;
        }

        .login-logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: contain;
            display: block;
            margin: 0 auto 16px;
        }

        .login-title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .login-subtitle {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
        }

        .form-group input[readonly] {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover { opacity: 0.9; }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .login-error {
            display: none;
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            margin-top: 14px;
            text-align: center;
        }

        .login-success {
            display: none;
            background: rgba(46, 160, 67, 0.1);
            border: 1px solid #2ea043;
            color: #2ea043;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            margin-top: 14px;
            text-align: center;
        }

        .forced-hint {
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.25);
            color: var(--text-secondary);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 18px;
        }

        .login-footer {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 20px;
        }
    </style>
    <script src="util.js"></script>
</head>
<body class="login-page">
    <div class="login-card">
        <img class="login-logo" src="etcd-icon.svg" alt="etcd">
        <div class="login-title">修改密码</div>
        <div class="login-subtitle" id="subtitle">请设置新的登录密码</div>

        <div class="forced-hint" id="forcedHint" style="display:none">
            ⚠ 首次登录或密码已被重置，必须完成密码修改才能进入后台。修改成功后将自动返回登录页。
        </div>

        <form id="changePwdForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" readonly>
            </div>
            <div class="form-group">
                <label for="oldPassword">当前密码</label>
                <input type="password" id="oldPassword" name="oldPassword" placeholder="请输入当前密码" autocomplete="current-password" required autofocus>
            </div>
            <div class="form-group">
                <label for="newPassword">新密码</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="至少 8 位" autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">再次输入新密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="重复新密码" autocomplete="new-password" required>
            </div>
            <button type="submit" class="login-btn" id="submitBtn">提 交</button>
            <div class="login-error" id="errorMsg"></div>
            <div class="login-success" id="successMsg"></div>
        </form>

        <div class="login-footer">etcd Monitor Dashboard</div>
    </div>

    <script>
    // 应用主题
    (function() {
        var theme = localStorage.getItem('etcdmonitor-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    })();

    var params = new URLSearchParams(window.location.search);
    var usernameParam = params.get('username') || 'admin';
    var forced = params.get('forced') === '1';

    document.getElementById('username').value = usernameParam;
    if (forced) {
        document.getElementById('forcedHint').style.display = 'block';
    }

    var MIN_LEN = 8;

    function showErr(msg) {
        var el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
    }

    function showOK(msg) {
        var el = document.getElementById('successMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
    }

    document.getElementById('changePwdForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        var btn = document.getElementById('submitBtn');
        var username = document.getElementById('username').value.trim();
        var oldPwd = document.getElementById('oldPassword').value;
        var newPwd = document.getElementById('newPassword').value;
        var confirm = document.getElementById('confirmPassword').value;

        if (!username || !oldPwd || !newPwd || !confirm) return;

        // 前端校验
        if (newPwd.length < MIN_LEN) {
            showErr('新密码长度不足，至少 ' + MIN_LEN + ' 位');
            return;
        }
        if (newPwd !== confirm) {
            showErr('两次输入的新密码不一致');
            return;
        }
        if (newPwd === oldPwd) {
            showErr('新密码不能与当前密码相同');
            return;
        }

        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            var resp = await fetch('/api/auth/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: username,
                    old_password: oldPwd,
                    new_password: newPwd
                })
            });

            if (resp.ok) {
                // 清理可能遗留的旧 token
                sessionStorage.removeItem('etcdmonitor_token');
                showOK('密码修改成功，即将跳转登录页...');
                setTimeout(function() {
                    if (forced) {
                        window.location.href = '/login.html';
                    } else {
                        window.location.href = '/';
                    }
                }, 1000);
                return;
            }
            var data = await resp.json().catch(function() { return {}; });
            showErr(data.error || '修改失败');
        } catch (err) {
            showErr('网络错误：' + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = '提 交';
        }
    });
    </script>
</body>
</html>
