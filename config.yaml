# etcdmonitor 配置文件
etcd:
  # etcd 端点地址（支持逗号分隔多地址，SDK 内置 failover）
  # 单地址: "http://127.0.0.1:2379"
  # 多地址: "http://a:2379,http://b:2379,http://c:2379"
  # 使用 HTTPS 时: "https://a:2379,https://b:2379"
  endpoint: "http://127.0.0.1:2379"
  # 认证用户名（Collector 采集 etcd 指标使用）
  username: ""
  # 认证密码（Collector 采集 etcd 指标使用） - ⚠️ CHANGE THIS BEFORE DEPLOYMENT
  password: ""
  # metrics 路径
  metrics_path: "/metrics"

  # ===== TLS 配置（etcd 客户端连接） =====
  # 是否启用 TLS/SSL 连接到 etcd（需要 etcd 配置了 TLS）
  tls_enable: false
  # TLS 客户端证书文件路径（相对于程序所在目录）
  tls_cert: "certs/client.crt"
  # TLS 客户端私钥文件路径（相对于程序所在目录）
  tls_key: "certs/client.key"
  # TLS CA 证书文件路径（用于验证 etcd 服务端证书）
  tls_ca_cert: "certs/ca.crt"
  # 跳过服务端证书验证（仅用于测试，生产环境不推荐）
  tls_insecure_skip_verify: false
  # TLS 服务端名称（SNI），用于服务端证书验证
  tls_server_name: ""

server:
  # 监控面板监听地址
  listen: ":9090"
  # 是否开启 HTTPS（需要先生成证书：./tools/gen-certs.sh）
  tls_enable: false
  # TLS 证书文件路径（相对于程序所在目录）
  tls_cert: "certs/server.crt"
  # TLS 私钥文件路径（相对于程序所在目录）
  tls_key: "certs/server.key"
  # Dashboard 会话超时时间（秒），当 etcd 启用认证时 Dashboard 需要登录
  # 默认 3600（1 小时），0 表示不过期
  session_timeout: 3600

collector:
  # 采集间隔（秒）
  interval: 30

storage:
  # 数据文件路径（相对于程序所在目录）
  db_path: "data/etcdmonitor.db"
  # 数据保留天数
  retention_days: 7

kv_manager:
  # Key 路径分隔符
  separator: "/"
  # etcd 连接超时（秒）
  connect_timeout: 5
  # 单次请求超时（秒）
  request_timeout: 30
  # 最大 value 大小（字节），默认 2MB
  max_value_size: 2097152

ops:
  # 是否启用运维面板（Ops Tab），默认 true
  # 设为 false 时前端隐藏 Ops Tab，后端 /api/ops/* 接口返回 403
  ops_enable: true
  # 审计日志保留天数，默认 7 天，超期自动清理
  audit_retention_days: 7

auth:
  # Dashboard 本地登录相关配置（与 etcd 的 auth 完全独立）
  # 说明：etcd.username / etcd.password 仅供 Collector / KV Manager 等 SDK 客户端使用，
  #       Dashboard 登录始终使用本次变更引入的本地 users 表。
  # bcrypt 哈希成本参数，范围 8-14，默认 10；越界时回退到 10 并打印 WARN
  bcrypt_cost: 10
  # 连续登录失败锁定阈值，默认 5 次（login 与 change-password 共享同一计数器）
  lockout_threshold: 5
  # 账号锁定时长（秒），默认 900 秒（15 分钟）
  lockout_duration_seconds: 900
  # 修改/重置密码时的最小长度，默认 8
  min_password_length: 8

log:
  # 日志目录（相对于程序所在目录）
  dir: "logs"
  # 日志文件名
  filename: "etcdmonitor.log"
  # 日志级别: debug, info, warn, error
  level: "info"
  # 单个日志文件最大大小（MB），超过自动切割
  max_size_mb: 50
  # 保留日志文件个数
  max_files: 5
  # 旧日志保留天数（0 表示不按天数清理，仅按文件数控制）
  max_age: 30
  # 是否压缩归档旧日志（gzip）
  compress: false
  # 是否同时输出到控制台
  console: true
