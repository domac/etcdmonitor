# etcdmonitor 配置文件
etcd:
  # etcd 端点地址
  endpoint: "http://127.0.0.1:2379"
  # 认证用户名（Collector 采集 etcd 指标使用）
  username: ""
  # 认证密码（Collector 采集 etcd 指标使用） - ⚠️ CHANGE THIS BEFORE DEPLOYMENT
  password: ""
  # metrics 路径
  metrics_path: "/metrics"
  # 成员发现方式：true = 通过 etcd v3 HTTP API（需开启 gRPC-gateway）
  #              false = 通过 etcdctl 命令（不依赖 gRPC-gateway）
  discovery_via_api: false
  # etcdctl 所在目录（discovery_via_api: false 时使用）
  bin_path: "/data/services/etcd/bin"

server:
  # 监控面板监听地址
  listen: ":9090"
  # 是否开启 HTTPS（需要先生成证书：./gen-certs.sh）
  tls_enable: false
  # TLS 证书文件路径（相对于程序所在目录）
  tls_cert: "certs/server.crt"
  # TLS 私钥文件路径（相对于程序所在目录）
  tls_key: "certs/server.key"
  # Dashboard 会话超时时间（秒），当 etcd 启用认证时 Dashboard 需要登录
  # 默认 3600（1 小时），0 表示不过期
  session_timeout: 3600

collector:
  # 采集间隔（秒）
  interval: 30

storage:
  # 数据文件路径（相对于程序所在目录）
  db_path: "data/etcdmonitor.db"
  # 数据保留天数
  retention_days: 7

kv_manager:
  # Key 路径分隔符
  separator: "/"
  # etcd 连接超时（秒）
  connect_timeout: 5
  # 单次请求超时（秒）
  request_timeout: 5
  # 最大 value 大小（字节），默认 2MB
  max_value_size: 2097152

log:
  # 日志目录（相对于程序所在目录）
  dir: "logs"
  # 日志文件名
  filename: "etcdmonitor.log"
  # 日志级别: debug, info, warn, error
  level: "info"
  # 单个日志文件最大大小（MB），超过自动切割
  max_size_mb: 50
  # 保留日志文件个数
  max_files: 5
  # 旧日志保留天数（0 表示不按天数清理，仅按文件数控制）
  max_age: 30
  # 是否压缩归档旧日志（gzip）
  compress: false
  # 是否同时输出到控制台
  console: true
