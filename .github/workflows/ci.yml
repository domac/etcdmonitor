name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: go build
        run: go build ./...
      - name: go test -race
        run: go test ./... -race -timeout 5m

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: gofmt
        run: |
          # Only check project sources. vendor and openspec are excluded.
          UNFORMATTED=$(gofmt -l . | grep -v '^web/vendor/' | grep -v '^openspec/' || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::The following files are not gofmt-clean:"
            echo "$UNFORMATTED"
            exit 1
          fi
      - name: go vet
        run: go vet ./...

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # govulncheck: annotation-only initially. Flip to hard-fail in the next release
      # once the current findings are resolved or documented.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck ./...
        continue-on-error: true
        run: govulncheck ./...

      # gitleaks: HARD FAIL on any secret in the repository (current or historical).
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ./.gitleaks.toml

      # trivy: filesystem scan covering dependencies, secrets, and IaC misconfigurations.
      - name: trivy fs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,config
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
